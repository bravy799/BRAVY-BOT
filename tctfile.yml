# ==============================================================================
# BRAVY TECH BOT - FULL CONFIGURATION ENGINE (tctfile)
# Optimized for Maseno University ICT Labs & Production Deployment
# ==============================================================================

# ------------------------------------------------------------------------------
# CORE IDENTIFICATION
# ------------------------------------------------------------------------------
# Unique identifier for this specific instance. 
# Changing this helps differentiate your testing vs production logs.
SESSION_ID: "bravy_tech_tet1"

# Standard timezone for Kenya to ensure accurate logging and scheduled tasks.
TIMEZONE: "Africa/Nairobi"

# Hides verbose trace logs to keep your Render/VPS console clean.
FILTER_NOISE_LOGS: true

# The character(s) used to trigger Bravy Tech commands.
PREFIX: "."

# ------------------------------------------------------------------------------
# NETWORKING & ENVIRONMENT
# ------------------------------------------------------------------------------
# The port for the web dashboard. Standard for most cloud hosting environments.
SERVER_PORT: 3003

# UNIX Socket configuration (Uncomment only if using specialized VPS setups).
#UNIX_SOCKET_PATH: "/tmp/bravy_tech_1.sock"

# ------------------------------------------------------------------------------
# DATABASE OPTIMIZATION & PERFORMANCE
# ------------------------------------------------------------------------------
DATABASE:
  # SYNC_MODE Tuning:
  # "OFF"    - Maximum Speed. Best for high-traffic bots (slight risk on power loss).
  # "NORMAL" - Balanced. Recommended for most Bravy Tech deployments.
  # "FULL"   - Maximum Safety. Slower write speeds.
  SYNC_MODE: "NORMAL"
  
  # Batching settings for high-performance handling.
  BATCH_SIZE: 300
  FLUSH_INTERVAL: "5000"
  
  # Memory management (128MB Cache). 
  # Important for keeping your RAM usage stable on limited hardware.
  CACHE_MAX_BYTES: 134217728
  
  # Write-Ahead Logging for better concurrency.
  USE_WAL: true
  BUSY_TIMEOUT_MS: 15000

# ------------------------------------------------------------------------------
# MODERATION & SECURITY PROTOCOLS
# ------------------------------------------------------------------------------
LOCK_SYSTEM:
  # Strike system for group administration.
  MAX_WARNS: 3
  
  # Custom branded warning template.
  WARN_MESSAGE: "*⚠️ BRAVY TECH SECURITY NOTICE ⚠️*\n\n*USER:* {user}\n*MAX WARNINGS:* {max_warns}\n*REMAINING:* {remaining_warns}\n*REASON:* {reason}"
  
  # Fallback for unassigned moderation actions.
  DEFAULT_REASON: "Violation of group protocols."
  
  SHOW_TRIGGER_IN_REASON: true
  
  # Auto-cleanup for chat decluttering (minutes).
  DELETE_WARN_AFTER: 3

# ------------------------------------------------------------------------------
# BRAVY TECH VISUAL ASSETS
# These images are randomly selected for bot status and group welcomes.
# ------------------------------------------------------------------------------
ALIVE_IMAGES:
  - "https://images.unsplash.com/photo-1550751827-4bd374c3f58b"
  - "https://images.unsplash.com/photo-1518770660439-4636190af475"
  - "https://images.unsplash.com/photo-1517077304055-6e89abbf09b0"
  - "https://images.unsplash.com/photo-1504384308090-c894fdcc538d"
  - "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5"

WELCOME_IMAGES:
  - "https://images.unsplash.com/photo-1525547719571-a2d4ac8945e2"
  - "https://images.unsplash.com/photo-1451187580459-43490279c0fa"
  - "https://images.unsplash.com/photo-1531297484001-80022131f5a1"
  - "https://images.unsplash.com/photo-1485827404703-89b55fcc595e"

# ------------------------------------------------------------------------------
# ADVANCED LOGGING & EXTERNAL SYNC
# ------------------------------------------------------------------------------
# Minimum severity: "debug", "info", "warn", or "error".
LOG_LEVEL: "info"
LOG_TO_FILE: false
LOG_FILE_PATH: "data/app.log"

# PostgreSQL External Database Configuration
# Note: These are usually overridden by your Render/VPS environment variables.
# POSTGRES_URL: "postgresql://user:pass@host:5432/db"
# POSTGRES_SYNC_INTERVAL: 60

# ------------------------------------------------------------------------------
# END OF CONFIGURATION
# ==============================================================================
