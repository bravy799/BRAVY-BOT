version: "1"
services:
  - type: web
    name: TCTECH
    runtime: docker
    plan: free
    region: virginia
    dockerContext: .
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: commit

    envVars:
      - key: SESSION_ID
        sync: false
      - key: TIMEZONE
        sync: false
      - key: PREFIX
        sync: false
